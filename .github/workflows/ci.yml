# ===========================================================================
# BitNet CI/CD Pipeline
# ===========================================================================
# Triggers: push/PR to main, tags for releases
# Matrix: Python 3.11 + PyPy 3.10
# Steps: Rust build → Tests → Security audit → Docker push (on tag)
# ===========================================================================

name: BitNet CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly security scan (Monday 00:00 UTC)
    - cron: "0 0 * * 1"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------

jobs:
  # =====================================================================
  # 1. Build & Test (Python Matrix)
  # =====================================================================
  test:
    name: Test (${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.11", "pypy-3.10"]
        include:
          - python: "3.11"
            python-version: "3.11"
            runner: ubuntu-latest
          - python: "pypy-3.10"
            python-version: "pypy3.10"
            runner: ubuntu-latest

    steps:
      # ----- Checkout -----
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- Rust Cache -----
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend/core
          cache-on-failure: true

      # ----- Python Setup -----
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade pytest pytest-asyncio pytest-cov httpx hypothesis
          pip install maturin

      # ----- Generate Server Wrap Key (for tests) -----
      - name: Generate test server wrap key
        run: |
          mkdir -p secrets
          python -c "import secrets; open('secrets/server_key.txt','wb').write(secrets.token_bytes(32))"

      # ----- Build Rust Crypto Bridge -----
      - name: Build Rust crypto bridge with Maturin
        run: |
          cd backend/core
          maturin develop --release
        env:
          BITNET_SERVER_WRAP_KEY_FILE: ${{ github.workspace }}/secrets/server_key.txt

      # ----- Install App Dependencies -----
      - name: Install application dependencies
        run: |
          pip install -r requirements.txt

      # ----- Run Tests -----
      - name: Run test suite
        run: |
          python -m pytest backend/tests/ \
            -v \
            --tb=short \
            --cov=backend \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --no-header \
            -q
        env:
          BITNET_SERVER_WRAP_KEY_FILE: ${{ github.workspace }}/secrets/server_key.txt
          SQLALCHEMY_DATABASE_URL: "sqlite+aiosqlite:///:memory:"

      # ----- Zero-Trust Memory Check (grep guard) -----
      - name: Zero-Trust Guard — no plaintext secrets in source
        run: |
          echo "Checking for hardcoded secrets..."
          ! grep -rn 'password\s*=\s*"[^"]\{8,\}"' backend/ --include="*.py" | grep -v test | grep -v stub
          ! grep -rn 'SECRET_KEY\s*=' backend/ --include="*.py" | grep -v '.pyc' | grep -v '#'
          echo "✓ Zero-Trust guard passed — no plaintext secrets detected"

      # ----- Security Audit -----
      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Bandit — static security analysis
        run: |
          bandit -r backend/ \
            -ll \
            --exclude backend/tests \
            --format json \
            --output bandit-report.json || true
          bandit -r backend/ -ll --exclude backend/tests -f txt

      - name: Safety — dependency vulnerability check
        run: |
          safety check -r requirements.txt --json || true
          safety check -r requirements.txt --full-report

      # ----- Upload Coverage -----
      - name: Upload coverage to Codecov
        if: matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

      # ----- Upload Test Reports -----
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.python }}
          path: |
            coverage.xml
            bandit-report.json
          retention-days: 30

  # =====================================================================
  # 2. Build Docker Image (on main branch or tags)
  # =====================================================================
  docker:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----- Docker metadata -----
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      # ----- Docker Buildx -----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ----- Login to GitHub Container Registry -----
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ----- Build and push -----
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # =====================================================================
  # 3. Deploy (only on version tags)
  # =====================================================================
  deploy:
    name: Deploy to Production
    needs: [test, docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate server wrap key if missing
        run: |
          mkdir -p secrets
          if [ ! -f secrets/server_key.txt ]; then
            python -c "import secrets; open('secrets/server_key.txt','wb').write(secrets.token_bytes(32))"
          fi

      - name: Deploy with docker compose
        run: |
          echo "🚀 Deploying BitNet ${{ github.ref_name }}"
          docker compose up -d --build
          docker compose ps
        env:
          COMPOSE_PROJECT_NAME: bitnet

      - name: Health check
        run: |
          echo "Waiting for application to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ Application is healthy"
              exit 0
            fi
            echo "Attempt $i/30 — waiting..."
            sleep 5
          done
          echo "❌ Application failed to become healthy"
          docker compose logs app
          exit 1
