name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "pypy3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black isort flake8 mypy bandit pytest pytest-cov

      - name: Check formatting (black)
        run: black --check --diff backend/

      - name: Check import order (isort)
        run: isort --check --diff backend/

      - name: Lint (flake8)
        run: flake8 backend/ --max-line-length=100 --extend-ignore=E203

      - name: Type check (mypy)
        run: mypy --strict backend/ --ignore-missing-imports
        continue-on-error: true

      - name: Security scan (bandit)
        run: bandit -ll -r backend/ --exclude backend/tests/
        continue-on-error: true

      - name: Run tests with coverage
        run: pytest backend/tests/ -v --cov=backend --cov-report=term-missing --cov-fail-under=80
        env:
          PYTHONDONTWRITEBYTECODE: 1
